<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Benim Tek Dosya Sitem</title>
  <style>
    /* CSS buraya yazılır */
    body { background-color: #f0f0f0; font-family: Arial; }
    h1 { color: darkblue; }
    p { color: black; }
    button { padding: 10px; background-color: #007bff; color: white; border: none; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Merhaba Dünya!</h1>
  <p>Bu site HTML, CSS ve JavaScript’i tek dosyada içeriyor.</p>
  <button onclick="goster()">Tıkla</button>

  <script>
    // JavaScript buraya yazılır
    function goster() {
      alert("Butona tıkladın, JS çalışıyor!");
    }
  </script>
</body>
</html>
